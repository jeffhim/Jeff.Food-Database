<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>飲食日記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #F8F4EE;
  --surface: #FFFFFF;
  --surface-alt: #F0EAE1;
  --primary: #C84B31;
  --primary-hover: #B5422B;
  --primary-light: rgba(200,75,49,0.12);
  --accent: #2E7D32;
  --text: #1A1108;
  --text-sec: #7A6B5A;
  --border: #E5DDD2;
  --danger: #D32F2F;
  --danger-light: rgba(211,47,47,0.1);
  --shadow: 0 2px 12px rgba(26,17,8,0.08);
  --shadow-lg: 0 8px 32px rgba(26,17,8,0.14);
  --radius: 16px;
  --radius-sm: 10px;
  --color-cal: #E07C3E;
  --color-protein: #4A90D9;
  --color-carbs: #D4A017;
  --color-fat: #9B59B6;
  --color-sugar: #E74C6F;
  --color-fiber: #27AE60;
  --tab-h: 62px;
}
.dark {
  --bg: #141210;
  --surface: #1E1B17;
  --surface-alt: #2A2520;
  --primary: #E8834F;
  --primary-hover: #F09560;
  --primary-light: rgba(232,131,79,0.15);
  --accent: #5EBB7B;
  --text: #EDE5DC;
  --text-sec: #9B8E82;
  --border: #332E28;
  --danger: #EF5350;
  --danger-light: rgba(239,83,80,0.15);
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --color-cal: #F0934E;
  --color-protein: #5DA0E9;
  --color-carbs: #F0C440;
  --color-fat: #B370CC;
  --color-sugar: #F06080;
  --color-fiber: #40C870;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:'Figtree',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100dvh;height:100vh;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
input,button,select,textarea{font-family:inherit;font-size:16px}
button{cursor:pointer;border:none;background:none;color:inherit}

/* ── App Shell ── */
#app{display:flex;flex-direction:column;height:100dvh;height:100vh}
header{
  flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  z-index:20;
}
.header-row{display:flex;align-items:center;justify-content:space-between}
.app-title{font-family:'Young Serif',serif;font-size:24px;color:var(--primary);letter-spacing:-0.02em}
.session-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;color:var(--text-sec);
  background:var(--surface-alt);
  padding:4px 10px;border-radius:20px;
  margin-top:6px;
}
.session-badge i{font-size:10px;color:var(--primary)}
main{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.view{display:none;padding:16px 16px calc(16px + var(--tab-h))}
.view.active{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── Tab Bar ── */
.tab-bar{
  flex-shrink:0;
  display:flex;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom,0px);
  height:calc(var(--tab-h) + env(safe-area-inset-bottom,0px));
  z-index:20;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;font-size:11px;font-weight:600;color:var(--text-sec);
  transition:color .2s;padding:8px 0;
}
.tab i{font-size:20px;transition:color .2s}
.tab.active{color:var(--primary)}
.tab:active{transform:scale(0.95)}

/* ── Date Navigation ── */
.date-nav{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-bottom:20px;
}
.date-nav button{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--border);
  font-size:14px;color:var(--text-sec);
  transition:all .2s;
}
.date-nav button:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.date-nav button:active{transform:scale(0.92)}
.date-display{text-align:center}
.date-main{font-family:'Young Serif',serif;font-size:18px}
.date-sub{font-size:12px;color:var(--text-sec);margin-top:2px}
.today-btn{
  font-size:12px;font-weight:600;color:var(--primary);
  background:var(--primary-light);
  padding:4px 14px;border-radius:20px;
  transition:all .2s;
}
.today-btn:hover{background:var(--primary);color:#fff}
.today-btn.hidden{opacity:0;pointer-events:none}

/* ── Nutrition Dashboard ── */
.nutri-dash{
  background:var(--surface);
  border-radius:var(--radius);
  padding:24px 20px 20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}
.cal-ring-wrap{display:flex;justify-content:center;margin-bottom:20px}
.cal-ring-svg{width:150px;height:150px}
.cal-ring-bg{fill:none;stroke:var(--border);stroke-width:10}
.cal-ring-prog{
  fill:none;stroke:var(--color-cal);stroke-width:10;
  stroke-linecap:round;
  transform-origin:center;transform:rotate(-90deg);
  transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1),stroke .3s;
}
.cal-ring-prog.over{stroke:var(--danger)}
.cal-val{font-family:'Young Serif',serif;font-size:28px;fill:var(--text)}
.cal-goal{font-size:12px;fill:var(--text-sec)}
.cal-unit{font-size:11px;fill:var(--text-sec);font-weight:500}
.macro-bars{display:flex;flex-direction:column;gap:12px}
.macro-row{display:flex;align-items:center;gap:10px}
.macro-label{width:56px;font-size:12px;font-weight:600;color:var(--text-sec);flex-shrink:0;text-align:right}
.macro-track{flex:1;height:10px;background:var(--surface-alt);border-radius:5px;overflow:hidden;position:relative}
.macro-fill{height:100%;border-radius:5px;transition:width .8s cubic-bezier(.4,0,.2,1);min-width:0}
.macro-val{width:80px;font-size:12px;color:var(--text-sec);flex-shrink:0;text-align:left}
.macro-val .curr{font-weight:700;color:var(--text)}
.macro-val .over{color:var(--danger);font-weight:700}

/* ── Meal Sections ── */
.meals{display:flex;flex-direction:column;gap:12px;padding-bottom:16px}
.meal-card{
  background:var(--surface);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.meal-hdr{
  display:flex;align-items:center;padding:14px 16px;
  cursor:pointer;user-select:none;
  transition:background .2s;gap:10px;
}
.meal-hdr:active{background:var(--surface-alt)}
.meal-emoji{font-size:22px;line-height:1}
.meal-name{flex:1;font-weight:700;font-size:15px}
.meal-kcal{font-size:13px;color:var(--text-sec);font-weight:600}
.meal-kcal span{color:var(--color-cal);font-weight:700}
.meal-chevron{color:var(--text-sec);font-size:12px;transition:transform .3s}
.meal-chevron.open{transform:rotate(180deg)}
.meal-body{overflow:hidden;transition:max-height .35s ease}
.meal-body.collapsed{max-height:0!important}
.food-list{padding:0 12px}
.food-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 4px;
  border-top:1px solid var(--border);
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.food-info{flex:1;min-width:0}
.food-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.food-serving{font-size:11px;color:var(--text-sec);margin-top:1px}
.food-cal{font-size:13px;font-weight:700;color:var(--color-cal);white-space:nowrap;margin-right:4px}
.food-actions{display:flex;gap:2px}
.food-actions button{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text-sec);
  transition:all .2s;
}
.food-actions .edit-btn:hover{background:var(--primary-light);color:var(--primary)}
.food-actions .del-btn:hover{background:var(--danger-light);color:var(--danger)}
.add-food-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:12px;
  font-size:13px;font-weight:600;color:var(--primary);
  border-top:1px solid var(--border);
  transition:background .2s;
}
.add-food-btn:hover{background:var(--primary-light)}
.add-food-btn i{font-size:12px}
.empty-note{
  text-align:center;padding:8px 0 4px;
  font-size:12px;color:var(--text-sec);font-style:italic;
}

/* ── Goals Page ── */
.goals-header{font-family:'Young Serif',serif;font-size:22px;margin-bottom:20px;text-align:center}
.goals-grid{display:grid;gap:12px}
.goal-card{
  background:var(--surface);border-radius:var(--radius-sm);
  padding:16px;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:12px;
}
.goal-card.full{grid-column:1/-1}
.goal-icon{font-size:24px;width:40px;text-align:center;flex-shrink:0}
.goal-body{flex:1}
.goal-label{font-size:13px;font-weight:600;color:var(--text-sec);margin-bottom:6px}
.goal-input-row{display:flex;align-items:center;gap:8px}
.goal-input{
  width:100%;height:42px;border:1.5px solid var(--border);border-radius:8px;
  padding:0 12px;font-size:16px;font-weight:600;
  background:var(--bg);color:var(--text);
  transition:border-color .2s;text-align:center;
}
.goal-input:focus{outline:none;border-color:var(--primary)}
.goal-unit{font-size:13px;color:var(--text-sec);font-weight:600;flex-shrink:0}
.goals-actions{margin-top:24px;display:flex;flex-direction:column;gap:12px}
.btn-primary{
  width:100%;height:48px;border-radius:var(--radius-sm);
  background:var(--primary);color:#fff;font-size:15px;font-weight:700;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary:hover{background:var(--primary-hover)}
.btn-primary:active{transform:scale(0.97)}
.btn-outline{
  width:100%;height:48px;border-radius:var(--radius-sm);
  background:transparent;color:var(--text-sec);font-size:14px;font-weight:600;
  border:1.5px solid var(--border);
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.45);
  opacity:0;pointer-events:none;
  transition:opacity .3s;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal-sheet{
  background:var(--surface);
  border-radius:20px 20px 0 0;
  width:100%;max-width:480px;
  max-height:92dvh;max-height:92vh;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
}
.modal-overlay.active .modal-sheet{transform:translateY(0)}
.modal-bar{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.modal-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 10px;flex-shrink:0;
}
.modal-title{font-family:'Young Serif',serif;font-size:18px}
.modal-close{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface-alt);font-size:14px;color:var(--text-sec);
  transition:all .2s;
}
.modal-close:hover{background:var(--danger-light);color:var(--danger)}
.modal-tabs{
  display:flex;padding:0 20px;gap:4px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.modal-tab{
  flex:1;padding:10px 0;text-align:center;
  font-size:13px;font-weight:600;color:var(--text-sec);
  border-bottom:2.5px solid transparent;
  transition:all .2s;
}
.modal-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-panel{display:none;padding:16px 20px}
.tab-panel.active{display:block}

/* Preset search & filter */
.preset-search{
  position:relative;margin-bottom:12px;
}
.preset-search input{
  width:100%;height:42px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:0 12px 0 38px;font-size:15px;background:var(--bg);color:var(--text);
}
.preset-search input:focus{outline:none;border-color:var(--primary)}
.preset-search i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-sec);font-size:14px}
.cat-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch}
.cat-chips::-webkit-scrollbar{display:none}
.cat-chip{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:600;
  background:var(--surface-alt);color:var(--text-sec);
  transition:all .2s;white-space:nowrap;
}
.cat-chip.active{background:var(--primary);color:#fff}
.preset-list{display:flex;flex-direction:column;gap:6px;padding-bottom:16px}
.preset-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius-sm);
  background:var(--bg);cursor:pointer;
  transition:all .2s;
}
.preset-item:hover{background:var(--primary-light)}
.preset-item:active{transform:scale(0.98)}
.preset-icon{font-size:20px;width:32px;text-align:center}
.preset-info{flex:1;min-width:0}
.preset-name{font-weight:600;font-size:14px}
.preset-serving{font-size:11px;color:var(--text-sec)}
.preset-cal{font-size:13px;font-weight:700;color:var(--color-cal);white-space:nowrap}
.preset-empty{text-align:center;padding:30px 0;color:var(--text-sec);font-size:13px}

/* Food form */
.food-form{display:flex;flex-direction:column;gap:14px;padding-bottom:24px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-sec);margin-bottom:5px}
.form-input{
  width:100%;height:44px;border:1.5px solid var(--border);border-radius:8px;
  padding:0 12px;font-size:16px;background:var(--bg);color:var(--text);
  transition:border-color .2s;
}
.form-input:focus{outline:none;border-color:var(--primary)}
.nutri-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.nutri-field label{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;margin-bottom:5px}
.nutri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nutri-input-row{display:flex;align-items:center;gap:6px}
.nutri-input{
  flex:1;height:42px;border:1.5px solid var(--border);border-radius:8px;
  padding:0 10px;font-size:16px;background:var(--bg);color:var(--text);
  text-align:center;transition:border-color .2s;
}
.nutri-input:focus{outline:none;border-color:var(--primary)}
.nutri-unit{font-size:12px;color:var(--text-sec);font-weight:600;width:28px;flex-shrink:0}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--surface-alt);font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;color:var(--text);
}
.qty-btn:hover{background:var(--primary-light);color:var(--primary)}
.qty-val{font-size:18px;font-weight:700;min-width:30px;text-align:center}

/* ── Confirm Dialog ── */
.confirm-content{
  background:var(--surface);
  border-radius:var(--radius);
  padding:28px 24px 20px;
  max-width:320px;width:90%;
  text-align:center;
  box-shadow:var(--shadow-lg);
}
.confirm-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.confirm-overlay.active{opacity:1;pointer-events:auto}
.confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-msg{font-size:15px;line-height:1.5;margin-bottom:20px;color:var(--text)}
.confirm-actions{display:flex;gap:10px}
.confirm-actions button{
  flex:1;height:42px;border-radius:8px;font-size:14px;font-weight:600;
  transition:all .2s;
}
.confirm-cancel{background:var(--surface-alt);color:var(--text-sec)}
.confirm-cancel:hover{background:var(--border)}
.confirm-ok{background:var(--danger);color:#fff}
.confirm-ok:hover{background:#C62828}

/* ── Toast ── */
.toast{
  position:fixed;
  bottom:calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 12px);
  left:50%;z-index:150;
  transform:translateX(-50%) translateY(60px);
  background:var(--text);color:var(--bg);
  padding:10px 22px;border-radius:26px;
  font-size:13px;font-weight:600;
  opacity:0;transition:all .35s cubic-bezier(.32,.72,0,1);
  white-space:nowrap;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── Responsive ── */
@media(min-width:640px){
  .modal-overlay{align-items:center}
  .modal-sheet{border-radius:var(--radius);max-height:80vh;margin:20px}
  .goals-grid{grid-template-columns:1fr 1fr}
}
@media(min-width:480px){
  .nutri-grid{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-row">
      <div class="app-title">飲食日記</div>
      <button id="exportBtnHeader" title="匯出資料" style="font-size:18px;color:var(--text-sec);padding:6px"><i class="fa-solid fa-arrow-up-from-bracket"></i></button>
    </div>
    <div class="session-badge"><i class="fa-solid fa-flask"></i>測試模式 — 資料僅於此次使用中保留</div>
  </header>

  <main>
    <!-- ===== Diary View ===== -->
    <div id="diary-view" class="view active">
      <div class="date-nav">
        <button id="prevDay"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="date-display">
          <div class="date-main" id="dateMain"></div>
          <div class="date-sub" id="dateSub"></div>
        </div>
        <button id="nextDay"><i class="fa-solid fa-chevron-right"></i></button>
        <button class="today-btn" id="todayBtn">今天</button>
      </div>

      <div class="nutri-dash" id="nutriDash"></div>
      <div class="meals" id="mealsList"></div>
    </div>

    <!-- ===== Goals View ===== -->
    <div id="goals-view" class="view">
      <div class="goals-header">🎯 營養目標</div>
      <div class="goals-grid" id="goalsGrid"></div>
      <div class="goals-actions">
        <button class="btn-primary" id="saveGoalsBtn"><i class="fa-solid fa-check"></i> 儲存目標</button>
        <button class="btn-outline" id="exportBtn"><i class="fa-solid fa-file-export"></i> 匯出所有資料 (JSON)</button>
      </div>
    </div>
  </main>

  <nav class="tab-bar">
    <button class="tab active" data-view="diary"><i class="fa-solid fa-book"></i><span>日記</span></button>
    <button class="tab" data-view="goals"><i class="fa-solid fa-bullseye"></i><span>目標</span></button>
  </nav>
</div>

<!-- ===== Food Modal ===== -->
<div class="modal-overlay" id="foodModal">
  <div class="modal-sheet">
    <div class="modal-bar"></div>
    <div class="modal-top">
      <div class="modal-title" id="modalTitle">加入食物</div>
      <button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-tabs" id="modalTabsWrap">
      <button class="modal-tab active" data-tab="presets">常用</button>
      <button class="modal-tab" data-tab="custom">自訂</button>
    </div>
    <div class="modal-body">
      <div class="tab-panel active" id="panel-presets">
        <div class="preset-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="presetSearch" placeholder="搜尋食物…">
        </div>
        <div class="cat-chips" id="catChips"></div>
        <div class="preset-list" id="presetList"></div>
      </div>
      <div class="tab-panel" id="panel-custom">
        <div class="food-form" id="foodForm">
          <div class="form-group">
            <label>食物名稱</label>

<script>
/* ─── Dark Mode ─── */
(function(){
  if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.classList.add('dark');
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',e=>{
    e.matches?document.documentElement.classList.add('dark'):document.documentElement.classList.remove('dark');
  });
})();

/* ─── Helpers ─── */
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmt(n){return n==null?0:Number(n);}
function fmtN(n){return n>=1000?n.toLocaleString():String(n);}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function getDateStr(d){return d.toISOString().slice(0,10);}
function dayNames(){return['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];}

/* ─── Data Manager (Firebase-ready interface) ─── */
const db={
  _data:{
    goals:{calories:2000,protein:60,carbs:250,fat:65,sugar:50,fiber:25},
    entries:{}
  },
  getGoals(){return{...this._data.goals};},
  saveGoals(g){this._data.goals={...g};},
  getEntries(dateStr){return[...(this._data.entries[dateStr]||[])];},
  addEntry(dateStr,entry){
    if(!this._data.entries[dateStr])this._data.entries[dateStr]=[];
    entry.id=genId();
    this._data.entries[dateStr].push({...entry});
    return entry;
  },
  updateEntry(dateStr,id,updates){
    const arr=this._data.entries[dateStr];
    if(!arr)return;
    const i=arr.findIndex(e=>e.id===id);
    if(i>=0)Object.assign(arr[i],updates);
  },
  deleteEntry(dateStr,id){
    const arr=this._data.entries[dateStr];
    if(!arr)return;
    this._data.entries[dateStr]=arr.filter(e=>e.id!==id);
  },
  exportAll(){return JSON.parse(JSON.stringify(this._data));}
};

/* ─── Preset Foods ─── */
const PRESETS=[

/* ─── Meal Config ─── */
const MEALS=[
  {key:'breakfast',name:'早餐',emoji:'🌅'},
  {key:'lunch',name:'午餐',emoji:'☀️'},

const NUTRIENTS=[

  {key:'carbs',label:'碳水',color:'var(--color-carbs)'},
  {key:'fat',label:'脂肪',color:'var(--color-fat)'},
  {key:'sugar',label:'糖',color:'var(--color-sugar)'},

/* ─── State ─── */
let currentDate=new Date();
let currentView='diary';
let modalMeal='breakfast';
let editingId=null;
let editingDate=null;
let modalQty=1;
let selectedCat='全部';
let confirmCb=null;
let mealExpanded={breakfast:true,lunch:true,dinner:true,snack:true};

/* ─── Rendering ─── */
function renderDate(){
  const d=currentDate;
  const today=getDateStr(new Date());
  const ds=getDateStr(d);
  document.getElementById('dateMain').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  document.getElementById('dateSub').textContent=dayNames()[d.getDay()];
  document.getElementById('todayBtn').classList.toggle('hidden',ds===today);
}

function renderNutriDash(){
  const ds=getDateStr(currentDate);
  const entries=db.getEntries(ds);
  const goals=db.getGoals();
  const totals={calories:0,protein:0,carbs:0,fat:0,sugar:0,fiber:0};
  entries.forEach(e=>{
    totals.calories+=fmt(e.cal);
    totals.protein+=fmt(e.protein);
    totals.carbs+=fmt(e.carbs);
    totals.fat+=fmt(e.fat);
    totals.sugar+=fmt(e.sugar);
    totals.fiber+=fmt(e.fiber);
  });
  const calPct=goals.calories>0?totals.calories/goals.calories:0;
  const circ=2*Math.PI*58;
  const offset=circ*(1-Math.min(calPct,1));
  const isOver=calPct>1;

  let html=`<div class="cal-ring-wrap">
    <svg class="cal-ring-svg" viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="58" class="cal-ring-bg"/>
      <circle cx="70" cy="70" r="58" class="cal-ring-prog${isOver?' over':''}"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
        style="transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)"/>
      <text x="70" y="58" text-anchor="middle" class="cal-val">${fmtN(Math.round(totals.calories))}</text>
      <text x="70" y="78" text-anchor="middle" class="cal-goal">/ ${fmtN(goals.calories)}</text>
      <text x="70" y="94" text-anchor="middle" class="cal-unit">kcal</text>
    </svg>
  </div><div class="macro-bars">`;

  NUTRIENTS.forEach(n=>{
    const val=Math.round(totals[n.key]*10)/10;
    const goal=goals[n.key];
    const pct=goal>0?val/goal:0;
    const w=Math.min(pct*100,100);
    const over=pct>1;
    html+=`<div class="macro-row">
      <div class="macro-label">${n.label}</div>
      <div class="macro-track"><div class="macro-fill" style="width:${w}%;background:${over?'var(--danger)':n.color}"></div></div>
      <div class="macro-val"><span class="${over?'over':'curr'}">${val}</span> / ${goal}g</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('nutriDash').innerHTML=html;
}

function renderMeals(){
  const ds=getDateStr(currentDate);
  const entries=db.getEntries(ds);
  let html='';
  MEALS.forEach(m=>{
    const items=entries.filter(e=>e.meal===m.key);
    const mealCal=items.reduce((s,e)=>s+fmt(e.cal),0);
    const isOpen=mealExpanded[m.key];
    html+=`<div class="meal-card">
      <div class="meal-hdr" data-meal="${m.key}" onclick="toggleMeal('${m.key}')">
        <span class="meal-emoji">${m.emoji}</span>
        <span class="meal-name">${m.name}</span>
        <span class="meal-kcal"><span>${Math.round(mealCal)}</span> kcal</span>
        <i class="fa-solid fa-chevron-down meal-chevron${isOpen?' open':''}"></i>
      </div>
      <div class="meal-body${isOpen?'':' collapsed'}" style="max-height:${isOpen?items.length*70+60+'px':'0'}">
        <div class="food-list">`;
    if(items.length===0){
      html+='<div class="empty-note">尚未記錄</div>';
    }else{
      items.forEach(item=>{
        html+=`<div class="food-item">
          <div class="food-info">
            <div class="food-name">${esc(item.name)}</div>
            <div class="food-serving">${esc(item.serving||'')}</div>
          </div>
          <div class="food-cal">${Math.round(fmt(item.cal))}</div>
          <div class="food-actions">
            <button class="edit-btn" onclick="editFood('${ds}','${item.id}')" title="編輯"><i class="fa-solid fa-pen"></i></button>
            <button class="del-btn" onclick="deleteFood('${ds}','${item.id}','${esc(item.name)}')" title="刪除"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>`;
      });
    }
    html+=`</div>
        <button class="add-food-btn" onclick="openAddModal('${m.key}')"><i class="fa-solid fa-plus"></i> 加入食物</button>
      </div>
    </div>`;
  });
  document.getElementById('mealsList').innerHTML=html;
}

function renderGoals(){
  const goals=db.getGoals();
  const fields=[
    {key:'calories',label:'每日卡路里',icon:'🔥',unit:'kcal',full:true},
    {key:'protein',label:'蛋白質',icon:'💪',unit:'g'},
    {key:'carbs',label:'碳水化合物',icon:'🌾',unit:'g'},
    {key:'fat',label:'脂肪',icon:'🫒',unit:'g'},
    {key:'sugar',label:'糖',icon:'🍬',unit:'g'},
    {key:'fiber',label:'纖維',icon:'🥦',unit:'g'},
  ];
  let html='';
  fields.forEach(f=>{
    html+=`<div class="goal-card${f.full?' full':''}">
      <div class="goal-icon">${f.icon}</div>
      <div class="goal-body">
        <div class="goal-label">${f.label}</div>
        <div class="goal-input-row">
          <input class="goal-input" type="number" inputmode="decimal" id="goal-${f.key}" value="${goals[f.key]}" min="0">
          <span class="goal-unit">${f.unit}</span>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('goalsGrid').innerHTML=html;
}

function renderPresets(){
  const q=document.getElementById('presetSearch').value.toLowerCase().trim();
  let items=PRESETS;
  if(selectedCat!=='全部')items=items.filter(p=>p.cat===selectedCat);
  if(q)items=items.filter(p=>p.name.toLowerCase().includes(q)||p.cat.includes(q));

  let chipsHtml='';
  CATS.forEach(c=>{
    chipsHtml+=`<button class="cat-chip${c===selectedCat?' active':''}" onclick="selectCat('${c}')">${c}</button>`;
  });
  document.getElementById('catChips').innerHTML=chipsHtml;

  if(items.length===0){
    document.getElementById('presetList').innerHTML='<div class="preset-empty">找不到相關食物</div>';
    return;
  }
  let html='';
  items.forEach((p,i)=>{
    html+=`<div class="preset-item" onclick="selectPreset(${i})" style="animation-delay:${i*0.03}s">
      <span class="preset-icon">${p.icon}</span>
      <div class="preset-info">
        <div class="preset-name">${p.name}</div>
        <div class="preset-serving">${p.serving}</div>
      </div>
      <div class="preset-cal">${p.cal} kcal</div>
    </div>`;
  });
  document.getElementById('presetList').innerHTML=html;
}

function renderAll(){
  renderDate();
  renderNutriDash();
  renderMeals();
}

/* ─── Interactions ─── */
function switchView(view){
  currentView=view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(view+'-view').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.view===view);
  });
  if(view==='goals')renderGoals();
  if(view==='diary')renderAll();
}

function toggleMeal(key){
  mealExpanded[key]=!mealExpanded[key];
  renderMeals();
}

function changeDate(delta){
  currentDate.setDate(currentDate.getDate()+delta);
  renderAll();
}

function goToday(){
  currentDate=new Date();
  renderAll();
}

/* ─── Modal ─── */
function openModal(){
  document.getElementById('foodModal').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('foodModal').classList.remove('active');
  document.body.style.overflow='';
  editingId=null;editingDate=null;modalQty=1;
}

function switchModalTab(tab){
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

function openAddModal(meal){
  editingId=null;editingDate=null;modalMeal=meal;modalQty=1;
  document.getElementById('modalTitle').textContent='加入食物 — '+MEALS.find(m=>m.key===meal).name;
  document.getElementById('modalTabsWrap').style.display='flex';
  clearForm();
  switchModalTab('presets');
  renderPresets();
  openModal();
}

function editFood(dateStr,id){
  const entries=db.getEntries(dateStr);
  const item=entries.find(e=>e.id===id);
  if(!item)return;
  editingId=id;editingDate=dateStr;modalMeal=item.meal;modalQty=1;
  document.getElementById('modalTitle').textContent='編輯食物';
  document.getElementById('modalTabsWrap').style.display='none';
  fillForm(item);
  switchModalTab('custom');
  openModal();
}

function clearForm(){
  document.getElementById('fName').value='';
  document.getElementById('fServing').value='';
  document.getElementById('fCal').value='';
  document.getElementById('fProtein').value='';
  document.getElementById('fCarbs').value='';
  document.getElementById('fFat').value='';
  document.getElementById('fSugar').value='';
  document.getElementById('fFiber').value='';
  modalQty=1;
  document.getElementById('qtyVal').textContent='1';
}

function fillForm(item){
  document.getElementById('fName').value=item.name||'';
  document.getElementById('fServing').value=item.serving||'';
  document.getElementById('fCal').value=item.cal||'';
  document.getElementById('fProtein').value=item.protein||'';
  document.getElementById('fCarbs').value=item.carbs||'';
  document.getElementById('fFat').value=item.fat||'';
  document.getElementById('fSugar').value=item.sugar||'';
  document.getElementById('fFiber').value=item.fiber||'';
  modalQty=1;
  document.getElementById('qtyVal').textContent='1';
}

function selectPreset(idx){
  const filtered=PRESETS.filter(p=>{
    if(selectedCat!=='全部'&&p.cat!==selectedCat)return false;
    const q=document.getElementById('presetSearch').value.toLowerCase().trim();
    if(q&&!p.name.toLowerCase().includes(q)&&!p.cat.includes(q))return false;
    return true;
  });
  const p=filtered[idx];
  if(!p)return;
  fillForm({name:p.name,serving:p.serving,cal:p.cal,protein:p.protein,carbs:p.carbs,fat:p.fat,sugar:p.sugar,fiber:p.fiber});
  switchModalTab('custom');
}

function selectCat(cat){
  selectedCat=cat;
  renderPresets();
}

function updateQty(delta){
  modalQty=Math.max(1,modalQty+delta);
  document.getElementById('qtyVal').textContent=modalQty;
}

function saveFood(){
  const name=document.getElementById('fName').value.trim();
  if(!name){showToast('請輸入食物名稱');return;}
  const q=modalQty;
  const entry={
    meal:modalMeal,
    name:q>1?name+' ×'+q:name,
    serving:document.getElementById('fServing').value.trim(),
    cal:Math.round(fmt(parseFloat(document.getElementById('fCal').value))*q*10)/10,
    protein:Math.round(fmt(parseFloat(document.getElementById('fProtein').value))*q*10)/10,
    carbs:Math.round(fmt(parseFloat(document.getElementById('fCarbs').value))*q*10)/10,
    fat:Math.round(fmt(parseFloat(document.getElementById('fFat').value))*q*10)/10,
    sugar:Math.round(fmt(parseFloat(document.getElementById('fSugar').value))*q*10)/10,
    fiber:Math.round(fmt(parseFloat(document.getElementById('fFiber').value))*q*10)/10,
  };
  const ds=editingDate||getDateStr(currentDate);
  if(editingId){
    db.updateEntry(ds,editingId,entry);
    showToast('已更新「'+name+'」');
  }else{
    db.addEntry(ds,entry);
    const mealName=MEALS.find(m=>m.key===modalMeal).name;
    showToast('已加入「'+name+'」到'+mealName);
    mealExpanded[modalMeal]=true;
  }
  closeModal();
  renderAll();
}

function deleteFood(dateStr,id,name){
  showConfirm('確定要刪除「'+name+'」嗎？',()=>{
    db.deleteEntry(dateStr,id);
    renderAll();
    showToast('已刪除');
  });
}

/* ─── Goals ─── */
function saveGoals(){
  const keys=['calories','protein','carbs','fat','sugar','fiber'];
  const goals={};
  keys.forEach(k=>{
    const v=parseFloat(document.getElementById('goal-'+k).value);
    goals[k]=isNaN(v)?0:Math.max(0,v);
  });
  db.saveGoals(goals);
  showToast('營養目標已儲存');
  if(currentView==='goals'){
    // stay on goals, but re-render diary in background
  }
}

/* ─── Export ─── */
function exportData(){
  const data=db.exportAll();
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='diet-diary-'+getDateStr(new Date())+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('資料已匯出');
}

/* ─── Confirm Dialog ─── */
function showConfirm(msg,cb){
  confirmCb=cb;
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmDialog').classList.add('active');
}
function hideConfirm(){
  document.getElementById('confirmDialog').classList.remove('active');
  confirmCb=null;
}

/* ─── Toast ─── */
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ─── Event Listeners ─── */
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>switchView(t.dataset.view));
});
document.getElementById('prevDay').addEventListener('click',()=>changeDate(-1));
document.getElementById('nextDay').addEventListener('click',()=>changeDate(1));
document.getElementById('todayBtn').addEventListener('click',goToday);
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('foodModal').addEventListener('click',e=>{
  if(e.target===e.currentTarget)closeModal();
});
document.querySelectorAll('.modal-tab').forEach(t=>{
  t.addEventListener('click',()=>switchModalTab(t.dataset.tab));
});
document.getElementById('presetSearch').addEventListener('input',renderPresets);
document.getElementById('qtyMinus').addEventListener('click',()=>updateQty(-1));
document.getElementById('qtyPlus').addEventListener('click',()=>updateQty(1));
document.getElementById('saveFood').addEventListener('click',saveFood);
document.getElementById('saveGoalsBtn').addEventListener('click',saveGoals);
document.getElementById('exportBtn').addEventListener('click',exportData);
document.getElementById('exportBtnHeader').addEventListener('click',exportData);
document.getElementById('confirmCancel').addEventListener('click',hideConfirm);
document.getElementById('confirmOk').addEventListener('click',()=>{
  if(confirmCb)confirmCb();
  hideConfirm();
});
document.getElementById('confirmDialog').addEventListener('click',e=>{
  if(e.target===e.currentTarget)hideConfirm();
});

/* Keyboard support for form */
document.getElementById('fName').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();document.getElementById('fServing').focus();}
});

/* ─── Init ─── */
renderAll();
</script>
</body>
